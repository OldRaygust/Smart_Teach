<div class="container">
  <h1>
    <p><strong>Curso:</strong> Lenguaje y Comunicación - 1º Básico</p>
  </h1>

  <div class="curso-info">
    <p>Unidad 1</p>
  </div>

  <table>
    <thead>
      <tr>
        <th>Número de clase</th>
        <th>Tema</th>
        <th>Material asignado</th>
        <th>Actividad asignada</th>
        <th>Completado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      @for(clase of clases; track clase){
      <tr>
        <td>{{ clase.numero }}</td>
        <td>{{ clase.material }}</td>
        <td>{{ clase.actividad }}</td>
        <td>{{ clase.tema }}</td>

        <td>
          <label class="switch">
            <input type="checkbox" />
            <span class="slider"></span>
          </label>
        </td>

        <td>
          <button class="btn">
            <img class="acciones_img" src="{{ clase.accion }}" alt="" />
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>

  <div class="acciones">
    <button class="btn">Añadir Clase</button>
  </div>

  <div class="nota"></div>
</div>
