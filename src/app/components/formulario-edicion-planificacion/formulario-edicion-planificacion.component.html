<!-- app.component.html -->
<div class="container">
  <!-- Panel izquierdo -->
  <div class="form-panel">
    <div class="modulo card">
      <h3>Añadir Experiencia</h3>
      <input type="text" placeholder="Título del trabajo" />
      <input type="text" placeholder="Empleador" />
      <input type="text" placeholder="Ciudad" />
      <input type="month" placeholder="Inicio" />
      <input type="month" placeholder="Fin" />
      <textarea placeholder="Descripción"></textarea>
      <button (click)="addExperience()">Agregar</button>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="preview-panel">
    <h2>Vista Previa del CV</h2>
    <div *ngFor="let exp of experiences" class="preview-card">
      <h3>{{ exp.titulo }}</h3>
      <p>
        <strong>{{ exp.empleador }}</strong> | {{ exp.ciudad }}
      </p>
      <p>{{ exp.inicio }} - {{ exp.fin }}</p>
      <p>{{ exp.descripcion }}</p>
    </div>
  </div>
</div>
